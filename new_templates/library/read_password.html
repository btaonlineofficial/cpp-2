<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Required — {{ book[1] }}</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary: #1a3a5c;
      --accent: #2e86de;
      --gold: #f5a623;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0d1b2a 0%, #1a3a5c 50%, #0f4c75 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 70%, rgba(46, 134, 222, 0.15) 0%, transparent 60%),
        radial-gradient(circle at 70% 30%, rgba(0, 189, 227, 0.1) 0%, transparent 60%);
    }

    .shapes span {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      animation: fl 8s infinite;
    }

    .shapes span:nth-child(1) {
      width: 120px;
      height: 120px;
      top: 10%;
      left: 5%;
      animation-delay: 0s;
    }

    .shapes span:nth-child(2) {
      width: 60px;
      height: 60px;
      top: 70%;
      left: 85%;
      animation-delay: 2s;
    }

    .shapes span:nth-child(3) {
      width: 80px;
      height: 80px;
      top: 50%;
      left: 50%;
      animation-delay: 4s;
    }

    .shapes span:nth-child(4) {
      width: 40px;
      height: 40px;
      top: 80%;
      left: 15%;
      animation-delay: 1s;
    }

    @keyframes fl {

      0%,
      100% {
        transform: translateY(0) scale(1);
      }

      50% {
        transform: translateY(-25px) scale(1.05);
      }
    }

    .box {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 44px 40px;
      width: 440px;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.35);
      animation: su 0.5s cubic-bezier(.16, 1, .3, 1);
    }

    @keyframes su {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .book-preview {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .book-preview::after {
      content: '📚';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 48px;
      opacity: 0.2;
    }

    .book-cover {
      width: 52px;
      height: 68px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.2);
    }

    .book-info h3 {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.3;
    }

    .book-info p {
      font-size: 12px;
      opacity: 0.75;
      margin-top: 3px;
    }

    .lock-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .lock-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #f5a623, #e67e22);
      border-radius: 18px;
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 8px 20px rgba(245, 166, 35, 0.3);
    }

    .lock-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--primary);
    }

    .lock-header p {
      font-size: 13px;
      color: #718096;
      margin-top: 4px;
    }

    .error-msg {
      background: #fff5f5;
      border: 1px solid #fc8181;
      color: #c53030;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #2d3748;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .inp-wrap {
      position: relative;
    }

    .inp-wrap input {
      width: 100%;
      padding: 13px 44px 13px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      color: #2d3748;
      background: #f7fafc;
      transition: all 0.2s;
      letter-spacing: 2px;
    }

    .inp-wrap input:focus {
      outline: none;
      border-color: var(--accent);
      background: white;
      box-shadow: 0 0 0 4px rgba(46, 134, 222, 0.1);
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      padding: 2px;
    }

    .btn-unlock {
      width: 100%;
      padding: 14px;
      margin-top: 16px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 6px 20px rgba(46, 134, 222, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-unlock:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(46, 134, 222, 0.45);
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #718096;
      font-size: 13px;
      text-decoration: none;
    }

    .back-link:hover {
      color: var(--accent);
    }

    .hint {
      margin-top: 14px;
      padding: 10px 14px;
      background: #f0f9ff;
      border: 1px solid #bee3f8;
      border-radius: 8px;
      font-size: 12px;
      color: #2b6cb0;
      text-align: center;
    }
    @media (max-width: 480px) {
      .box {
        width: 92%;
        padding: 30px 24px;
      }
      .book-preview::after {
        display: none;
      }
    }
  </style>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
</head>

<body>
  <div class="shapes"><span></span><span></span><span></span><span></span></div>
  <div class="box">
    <div class="book-preview">
      <div class="book-cover">📄</div>
      <div class="book-info">
        <h3>{{ book[1] }}</h3>
        <p>{% if book[2] %}{{ book[2] }}{% else %}Contai Polytechnic Library{% endif %}</p>
      </div>
    </div>
    <div class="lock-header">
      <div class="lock-icon">🔐</div>
      <h2>Password Protected</h2>
      <p>Enter password to read this eBook</p>
    </div>
    {% if error %}
    <div class="error-msg">⚠️ {{ error }}</div>
    {% endif %}
    <form method="POST">
      <label>Reading Password</label>
      <div class="inp-wrap">
        <input type="password" name="read_password" id="pw" placeholder="••••••••" required autofocus>
        <button type="button" class="toggle-pw"
          onclick="var i=document.getElementById('pw');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'👁️':'🙈';">👁️</button>
      </div>
      <button type="submit" class="btn-unlock">🔓 Open Book</button>
    </form>
    <div class="hint">💡 Your teacher or admin will provide the password</div>
    <a href="/library/department/{{ book[4] }}" class="back-link">← Back to Department</a>
  </div>
</body>

</html>
