<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Voice Helpdesk - Contai Polytechnic</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html,
        body {
            height: 100%;
            overflow: hidden
            overflow-x: hidden;
            width: 100%;
            max-width: 100vw;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #0a0c11;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            color: #f1f5f9;
            cursor: default;
            user-select: none;
        }

        /* ══ BACKGROUND ══ */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse 90% 70% at 50% 35%, #0f172a 0%, #020617 65%, #000000 100%);
        }

        /* Subtle grid */
        .bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, .022) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, .022) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, rgba(0, 0, 0, .8) 0%, transparent 70%);
        }

        /* Vignette */
        .bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 110% 110% at 50% 50%, transparent 35%, #030507 100%);
        }

        /* Dynamic ambient light behind character */
        .ambient-light {
            position: fixed;
            z-index: 1;
            pointer-events: none;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            background: radial-gradient(circle, rgba(100, 130, 255, .07) 0%, transparent 70%);
            transition: background 1.2s ease;
        }

        body.state-listening .ambient-light {
            background: radial-gradient(circle, rgba(56, 189, 248, .1) 0%, transparent 70%);
        }

        body.state-thinking .ambient-light {
            background: radial-gradient(circle, rgba(167, 139, 250, .09) 0%, transparent 70%);
        }

        body.state-speaking .ambient-light {
            background: radial-gradient(circle, rgba(52, 211, 153, .09) 0%, transparent 70%);
        }

        /* ══ LAYOUT ══ */
        .page {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            animation: pageIn 1s cubic-bezier(.22, 1, .36, 1) both;
        }

        @keyframes pageIn {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        /* ══ SPEECH BUBBLE ══ */
        .bubble-zone {
            height: 90px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            margin-bottom: 18px;
            width: min(480px, 88vw);
        }

        .bubble {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.95);
            border-radius: 18px;
            padding: 14px 22px;
            font-size: 14.5px;
            font-weight: 500;
            line-height: 1.65;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .5), 0 2px 8px rgba(0, 0, 0, .3);
            position: relative;
            opacity: 0;
            transform: translateY(6px) scale(.98);
            transition: opacity .35s ease, transform .4s cubic-bezier(.34, 1.4, .64, 1);
            pointer-events: none;
            width: 100%;
        }

        .bubble.show {
            opacity: 1;
            transform: none;
        }

        /* Arrow */
        .bubble::after {
            content: '';
            position: absolute;
            bottom: -9px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border: 10px solid transparent;
            border-top-color: rgba(15, 23, 42, 0.65);
            border-bottom: 0;
        }

        /* Top accent */
        .bubble::before {
            content: '';
            position: absolute;
            top: 0;
            left: 18px;
            right: 18px;
            height: 2.5px;
            border-radius: 8px;
            background: #6366f1;
            transition: background .6s;
        }

        body.state-idle .bubble::before {
            background: #6366f1;
        }

        body.state-listening .bubble::before {
            background: #38bdf8;
        }

        body.state-thinking .bubble::before {
            background: #a78bfa;
        }

        body.state-speaking .bubble::before {
            background: #34d399;
        }

                        /* ══ AVATAR CONTAINER ══ */
        .avatar-container {
            position: relative;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        /* State rings */
        .ring {
            position: absolute;
            inset: -18px;
            border-radius: 50%;
            border: 1.5px solid transparent;
            opacity: 0;
            transition: opacity .6s, border-color .6s;
            pointer-events: none;
        }

        .ring-2 {
            inset: -34px;
        }

        .ring-3 {
            inset: -50px;
        }

        body.state-listening .ring {
            border-color: rgba(56, 189, 248, .5);
            opacity: 1;
            animation: ringPulse 2s ease-in-out infinite;
        }

        body.state-listening .ring-2 {
            border-color: rgba(56, 189, 248, .25);
            opacity: 1;
            animation: ringPulse 2s ease-in-out infinite .6s;
        }

        body.state-listening .ring-3 {
            border-color: rgba(56, 189, 248, .12);
            opacity: 1;
            animation: ringPulse 2s ease-in-out infinite 1.2s;
        }

        body.state-speaking .ring {
            border-color: rgba(52, 211, 153, .5);
            opacity: 1;
            animation: ringPulse 1.4s ease-in-out infinite;
        }

        body.state-speaking .ring-2 {
            border-color: rgba(52, 211, 153, .25);
            opacity: 1;
            animation: ringPulse 1.4s ease-in-out infinite .4s;
        }

        body.state-speaking .ring-3 {
            border-color: rgba(52, 211, 153, .12);
            opacity: 1;
            animation: ringPulse 1.4s ease-in-out infinite .8s;
        }

        body.state-thinking .ring {
            border-color: rgba(167, 139, 250, .35);
            opacity: 1;
        }

        body.state-thinking .ring-2 {
            border-color: rgba(167, 139, 250, .18);
            opacity: 1;
        }

        @keyframes ringPulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.03);
                opacity: .5;
            }
        }

        /* Photo frame */
        .photo-frame {
            width: clamp(200px, 32vw, 260px);
            height: clamp(200px, 32vw, 260px);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 0 0 3px rgba(255, 255, 255, .08),
                0 0 0 5px rgba(255, 255, 255, .04),
                0 30px 80px rgba(0, 0, 0, .7),
                0 10px 30px rgba(0, 0, 0, .5);
            transition: box-shadow .6s, transform .4s cubic-bezier(.34, 1.4, .64, 1);
            animation: breathe 5s ease-in-out infinite;
        }

        @keyframes breathe {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.012);
            }
        }

        body.state-speaking .photo-frame {
            animation: speakBreathe 1.5s ease-in-out infinite;
            box-shadow: 0 0 0 3px rgba(52, 211, 153, .3), 0 0 0 6px rgba(52, 211, 153, .12), 0 30px 80px rgba(0, 0, 0, .7);
        }

        body.state-listening .photo-frame {
            box-shadow: 0 0 0 3px rgba(56, 189, 248, .3), 0 0 0 6px rgba(56, 189, 248, .12), 0 30px 80px rgba(0, 0, 0, .7);
        }

        body.state-thinking .photo-frame {
            animation: thinkTilt 3s ease-in-out infinite alternate;
        }

        @keyframes speakBreathe {

            0%,
            100% {
                transform: scale(1) translateY(0);
            }

            40% {
                transform: scale(1.018) translateY(-4px);
            }
        }

        @keyframes thinkTilt {
            from {
                transform: rotate(-1deg) translateX(3px);
            }

            to {
                transform: rotate(1.5deg) translateX(-2px) translateY(-4px);
            }
        }

        /* Photo itself */
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
            transition: filter .5s;
        }

        body.state-thinking .photo-frame img {
            filter: brightness(.92) saturate(.9);
        }

        body.state-speaking .photo-frame img {
            filter: brightness(1.04) saturate(1.05);
        }

        /* Subtle overlay for mood */
        .photo-overlay {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            transition: background .7s;
            pointer-events: none;
        }

        body.state-idle .photo-overlay {
            background: transparent;
        }

        body.state-listening .photo-overlay {
            background: rgba(56, 189, 248, .06);
        }

        body.state-thinking .photo-overlay {
            background: rgba(167, 139, 250, .08);
        }

        body.state-speaking .photo-overlay {
            background: rgba(52, 211, 153, .06);
        }

        /* Reflection / gloss on photo */
        .photo-gloss {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 255, 255, .1) 0%, transparent 55%);
            pointer-events: none;
        }

        /* ══ NAME & STATUS ══ */
        .identity {
            margin-top: 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .name {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(26px, 4.5vw, 32px);
            font-weight: 400;
            color: rgba(255, 255, 255, .92);
            letter-spacing: .3px;
            font-style: italic;
        }

        .role {
            font-size: 10.5px;
            font-weight: 600;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .3);
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .08);
            padding: 4px 14px;
            border-radius: 50px;
        }

        /* Status row */
        .status-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11.5px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .2);
            transition: color .4s;
            margin-top: 2px;
        }

        .sdot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .15);
            flex-shrink: 0;
            transition: background .4s, box-shadow .4s;
        }

        body.state-listening .status-row {
            color: rgba(56, 189, 248, .8);
        }

        body.state-listening .sdot {
            background: #38bdf8;
            box-shadow: 0 0 10px #38bdf8;
            animation: sdAnim 1s ease-in-out infinite;
        }

        body.state-thinking .status-row {
            color: rgba(167, 139, 250, .8);
        }

        body.state-thinking .sdot {
            background: #a78bfa;
            box-shadow: 0 0 10px #a78bfa;
            animation: sdAnim 1.8s ease-in-out infinite;
        }

        body.state-speaking .status-row {
            color: rgba(52, 211, 153, .8);
        }

        body.state-speaking .sdot {
            background: #34d399;
            box-shadow: 0 0 10px #34d399;
            animation: sdAnim .85s ease-in-out infinite;
        }

        @keyframes sdAnim {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(.4);
                opacity: .2;
            }
        }

        /* ══ THINKING INDICATOR (dots below name) ══ */
        .think-wrap {
            display: flex;
            gap: 5px;
            align-items: center;
            height: 20px;
            margin-top: 2px;
            opacity: 0;
            transition: opacity .4s;
        }

        body.state-thinking .think-wrap {
            opacity: 1;
        }

        .tdot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #a78bfa;
            opacity: .7;
        }

        body.state-thinking .tdot:nth-child(1) {
            animation: tdAn 1.1s ease-in-out infinite 0s;
        }

        body.state-thinking .tdot:nth-child(2) {
            animation: tdAn 1.1s ease-in-out infinite .22s;
        }

        body.state-thinking .tdot:nth-child(3) {
            animation: tdAn 1.1s ease-in-out infinite .44s;
        }

        @keyframes tdAn {

            0%,
            100% {
                transform: translateY(0);
                opacity: .4;
            }

            50% {
                transform: translateY(-7px);
                opacity: 1;
            }
        }

        /* ══ WAVE BAR (speaking) ══ */
        .wave-wrap {
            display: flex;
            gap: 4px;
            align-items: center;
            height: 20px;
            margin-top: 2px;
            opacity: 0;
            transition: opacity .4s;
        }

        body.state-speaking .wave-wrap {
            opacity: 1;
        }

        .wbar {
            width: 3.5px;
            border-radius: 3px;
            background: #34d399;
        }

        .wbar:nth-child(1) {
            animation: wAn 1s ease-in-out infinite 0s;
            height: 6px;
        }

        .wbar:nth-child(2) {
            animation: wAn 1s ease-in-out infinite .12s;
            height: 14px;
        }

        .wbar:nth-child(3) {
            animation: wAn 1s ease-in-out infinite .24s;
            height: 20px;
        }

        .wbar:nth-child(4) {
            animation: wAn 1s ease-in-out infinite .12s;
            height: 14px;
        }

        .wbar:nth-child(5) {
            animation: wAn 1s ease-in-out infinite 0s;
            height: 6px;
        }

        @keyframes wAn {

            0%,
            100% {
                transform: scaleY(.3);
                opacity: .5;
            }

            50% {
                transform: scaleY(1);
                opacity: 1;
            }
        }

        /* ══ BOTTOM CONTROLS ══ */
        .controls {
            position: fixed;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 14px;
            z-index: 50;
        }

        .btn {
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
            transition: all .3s cubic-bezier(.34, 1.4, .64, 1);
        }

        /* Mic */
        .btn-mic {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .1);
            backdrop-filter: blur(24px);
            color: rgba(255, 255, 255, .9);
            font-size: 26px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .6), inset 0 0 20px rgba(255,255,255,0.05);
            transition: all 0.4s cubic-bezier(.34, 1.4, .64, 1);
        }

        .btn-mic:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, .1);
            border-color: rgba(255, 255, 255, .2);
            box-shadow: 0 12px 40px rgba(0, 0, 0, .7), inset 0 0 20px rgba(255,255,255,0.1);
        }

        .btn-mic:active {
            transform: scale(.93);
        }



        body.state-listening .btn-mic {
            background: rgba(56, 189, 248, .16);
            border-color: rgba(56, 189, 248, .4);
            box-shadow: 0 0 36px rgba(56, 189, 248, .25), 0 8px 32px rgba(0, 0, 0, .4);
        }

        body.state-speaking .btn-mic {
            background: rgba(52, 211, 153, .16);
            border-color: rgba(52, 211, 153, .4);
            box-shadow: 0 0 36px rgba(52, 211, 153, .25), 0 8px 32px rgba(0, 0, 0, .4);
        }

        body.state-thinking .btn-mic {
            background: rgba(167, 139, 250, .16);
            border-color: rgba(167, 139, 250, .4);
            box-shadow: 0 0 36px rgba(167, 139, 250, .25), 0 8px 32px rgba(0, 0, 0, .4);
        }

        /* Mute small */
        .btn-sm {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .1);
            backdrop-filter: blur(16px);
            color: rgba(255, 255, 255, .4);
            font-size: 18px;
            transition: all 0.4s cubic-bezier(.34, 1.4, .64, 1);
        }

        .btn-sm:hover {
            background: rgba(255, 255, 255, .1);
            color: rgba(255, 255, 255, .8);
            transform: scale(1.08);
        }

        .btn-sm.on {
            background: rgba(239, 68, 68, .12);
            border-color: rgba(239, 68, 68, .25);
            color: #ef4444;
        }

        /* ══ TOP BADGE ══ */
        .top-bar {
            position: fixed;
            top: 22px;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            z-index: 50;
        }

        .inst-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: .35;
            transition: opacity .2s;
        }

        .inst-badge:hover {
            opacity: .8;
        }

        .inst-badge span {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .9);
        }

        .live-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10.5px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(52, 211, 153, .7);
            opacity: 0;
            transition: opacity .5s;
        }

        body.state-speaking .live-pill,
        body.state-listening .live-pill {
            opacity: 1;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #34d399;
            box-shadow: 0 0 8px #34d399;
            animation: livePulse 1.2s ease-in-out infinite;
        }

        body.state-listening .live-pill {
            color: rgba(56, 189, 248, .7);
        }

        body.state-listening .live-dot {
            background: #38bdf8;
            box-shadow: 0 0 8px #38bdf8;
        }

        @keyframes livePulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .3;
            }
        }

        /* Hint */
        .hint {
            position: fixed;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10.5px;
            font-weight: 600;
            letter-spacing: .8px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .12);
            pointer-events: none;
            z-index: 50;
            white-space: nowrap;
        }

        /* ══ FLOOR SHADOW ══ */
        .floor-shadow {
            width: clamp(180px, 30vw, 240px);
            height: 20px;
            border-radius: 50%;
            background: rgba(0, 0, 0, .5);
            filter: blur(20px);
            margin-top: -10px;
            transition: opacity .4s;
        }

    
                /* Professional 3D assistant avatar */
        .photo-frame {
            display: grid;
            place-items: center;
            overflow: visible;
            background: radial-gradient(circle at 50% 50%, rgba(15, 23, 42, 0.5), transparent 70%);
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .photo-frame img,
        .photo-overlay,
        .photo-gloss {
            display: none;
        }

        /* The sleek obsidian head */
        .ai-head {
            position: relative;
            width: 58%;
            height: 70%;
            border-radius: 40% 40% 55% 55%;
            background: linear-gradient(145deg, #1e293b 0%, #020617 100%);
            box-shadow:
                inset 0 10px 25px rgba(255, 255, 255, .15),
                inset 0 -20px 40px rgba(0, 0, 0, .9),
                0 20px 50px rgba(0, 0, 0, .8),
                0 0 40px rgba(56, 189, 248, .1);
            transform: rotateX(5deg) rotateY(0deg) translateZ(20px);
            animation: assistantIdle 5s ease-in-out infinite;
        }

        /* The dark glass visor */
        .ai-head::before {
            content: '';
            position: absolute;
            left: 6%;
            right: 6%;
            top: 25%;
            height: 32%;
            border-radius: 20px;
            background: linear-gradient(145deg, #0f172a 0%, #000000 100%);
            box-shadow: 
                inset 0 4px 10px rgba(255, 255, 255, .08), 
                inset 0 -4px 15px rgba(0, 0, 0, .9),
                0 8px 20px rgba(0, 0, 0, .6);
            z-index: 2;
        }

        /* Top highlight / Gloss reflection */
        .ai-head::after {
            content: '';
            position: absolute;
            left: 18%;
            right: 18%;
            top: 4%;
            height: 10%;
            border-radius: 50px;
            background: linear-gradient(180deg, rgba(255, 255, 255, .15), transparent);
            z-index: 3;
            pointer-events: none;
        }

        /* Sleek metallic hinges (ears) */
        .ai-ear {
            position: absolute;
            top: 40%;
            width: 8px;
            height: 40px;
            border-radius: 6px;
            background: linear-gradient(180deg, #475569, #0f172a);
            box-shadow: inset 0 2px 6px rgba(255, 255, 255, .3), 0 5px 15px rgba(0, 0, 0, .6);
            z-index: 1;
        }

        .ai-ear.left { left: -7px; }
        .ai-ear.right { right: -7px; }

        /* Glowing Neon Eyes */
        .ai-eye {
            position: absolute;
            top: 34%;
            width: 24px;
            height: 8px;
            border-radius: 12px;
            background: #38bdf8;
            box-shadow: 0 0 15px #38bdf8, 0 0 30px rgba(56, 189, 248, 0.5);
            z-index: 4;
            transition: all 0.4s cubic-bezier(.34, 1.4, .64, 1);
        }

        .ai-eye::after {
            display: none;
        }

        .ai-eye.left { left: 20%; }
        .ai-eye.right { right: 20%; }

        /* Minimalist LED Voice Indicator */
        .ai-mouth {
            position: absolute;
            left: 50%;
            bottom: 20%;
            width: 18px;
            height: 4px;
            transform: translateX(-50%);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 10px rgba(255, 255, 255, .1);
            z-index: 4;
            transition: all 0.2s ease-out;
        }

        /* Forehead Sensor Core */
        .ai-core {
            position: absolute;
            left: 50%;
            top: 10%;
            width: 10px;
            height: 10px;
            transform: translateX(-50%);
            border-radius: 50%;
            background: #10b981;
            box-shadow: 0 0 12px #10b981, inset 0 0 4px #fff;
            z-index: 4;
            transition: all 0.4s ease;
        }

        @keyframes assistantIdle {
            0%, 100% { transform: rotateX(4deg) rotateY(-4deg) translateY(0) translateZ(20px); }
            50% { transform: rotateX(8deg) rotateY(4deg) translateY(-8px) translateZ(28px); }
        }

        /* ══ LISTENING ══ */
        body.state-listening .ai-head {
            animation: assistantListen 2.5s ease-in-out infinite;
            box-shadow:
                inset 0 10px 25px rgba(255, 255, 255, .15),
                inset 0 -20px 40px rgba(0, 0, 0, .9),
                0 20px 50px rgba(0, 0, 0, .8),
                0 0 50px rgba(52, 211, 153, .3);
        }

        body.state-listening .ai-eye {
            height: 14px;
            width: 30px;
            border-radius: 20px;
            background: #34d399;
            box-shadow: 0 0 20px #34d399, 0 0 40px rgba(52, 211, 153, 0.6);
        }

        body.state-listening .ai-mouth {
            width: 10px;
            background: #34d399;
            box-shadow: 0 0 15px #34d399;
        }

        body.state-listening .ai-core {
            background: #34d399;
            box-shadow: 0 0 20px #34d399;
            animation: pulseCore 1s infinite alternate;
        }

        @keyframes pulseCore {
            0% { transform: translateX(-50%) scale(1); opacity: 0.6; }
            100% { transform: translateX(-50%) scale(1.4); opacity: 1; }
        }

        @keyframes assistantListen {
            0%, 100% { transform: rotateX(2deg) rotateY(-8deg) translateZ(25px); }
            50% { transform: rotateX(5deg) rotateY(8deg) translateY(-5px) translateZ(35px); }
        }

        /* ══ THINKING ══ */
        body.state-thinking .ai-head {
            animation: assistantThink 2s ease-in-out infinite alternate;
            box-shadow:
                inset 0 10px 25px rgba(255, 255, 255, .15),
                inset 0 -20px 40px rgba(0, 0, 0, .9),
                0 20px 50px rgba(0, 0, 0, .8),
                0 0 50px rgba(168, 85, 247, .2);
        }

        body.state-thinking .ai-eye {
            width: 18px;
            height: 6px;
            background: #c084fc;
            box-shadow: 0 0 20px #c084fc;
            animation: eyeScan 1.2s ease-in-out infinite alternate;
        }

        body.state-thinking .ai-mouth {
            width: 30px;
            background: #c084fc;
            box-shadow: 0 0 15px #c084fc;
            opacity: 0.6;
        }
        
        body.state-thinking .ai-core {
            background: #c084fc;
            box-shadow: 0 0 20px #c084fc;
            animation: pulseCore 0.6s infinite alternate;
        }

        @keyframes assistantThink {
            from { transform: rotateX(5deg) rotateY(-18deg) translateZ(22px); }
            to { transform: rotateX(10deg) rotateY(15deg) translateY(-4px) translateZ(30px); }
        }

        @keyframes eyeScan {
            0% { transform: translateX(-15px); opacity: 0.6; }
            100% { transform: translateX(15px); opacity: 1; }
        }

        /* ══ SPEAKING ══ */
        body.state-speaking .ai-head {
            animation: assistantSpeak 1.2s ease-in-out infinite;
        }

        body.state-speaking .ai-eye {
            height: 10px;
            background: #38bdf8;
            box-shadow: 0 0 20px #38bdf8;
        }

        body.state-speaking .ai-mouth {
            background: #38bdf8;
            box-shadow: 0 0 25px #38bdf8, 0 0 50px #38bdf8;
            animation: mouthTalk .35s ease-in-out infinite alternate;
        }

        body.state-speaking .ai-core {
            background: #38bdf8;
            box-shadow: 0 0 20px #38bdf8;
        }

        @keyframes assistantSpeak {
            0%, 100% { transform: rotateX(6deg) rotateY(-5deg) translateY(0) translateZ(25px); }
            50% { transform: rotateX(9deg) rotateY(5deg) translateY(-6px) translateZ(32px); }
        }

        @keyframes mouthTalk {
            0% { width: 14px; height: 4px; border-radius: 4px; }
            100% { width: 40px; height: 22px; border-radius: 12px; }
        }
    </style>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
</head>

<body class="state-idle">

    <div class="bg"></div>
    <div class="ambient-light"></div>

    <!-- Top bar -->
    <div class="top-bar">
        <div class="inst-badge">
            <span>🎓 Contai Polytechnic</span>
        </div>
        <div class="live-pill">
            <div class="live-dot"></div>
            <span id="liveLabel">Live</span>
        </div>
    </div>

    <!-- Scene -->
    <div class="page">

        <!-- Speech bubble -->
        <div class="bubble-zone">
            <div class="bubble" id="bubble"></div>
        </div>

                <!-- Avatar -->
        <div class="avatar-container" onclick="handleTap()" tabindex="0" role="button" aria-label="Talk to AI helpdesk">
            <div class="ring"></div>
            <div class="ring ring-2"></div>
            <div class="ring ring-3"></div>

            <div class="photo-frame" id="photoFrame" aria-hidden="true">
                <div class="ai-head">
                    <div class="ai-ear left"></div>
                    <div class="ai-ear right"></div>
                    <div class="ai-eye left"></div>
                    <div class="ai-eye right"></div>
                    <div class="ai-mouth"></div>
                    <div class="ai-core"></div>
                </div>
            </div>
        </div>

        <!-- Floor shadow -->
        <div class="floor-shadow"></div>

        <!-- Identity -->
        <div class="identity">
            <span class="name">AI Helpdesk</span>
            <span class="role">Voice Assistant · Contai Polytechnic</span>

            <!-- Dynamic indicator row -->
            <div class="status-row">
                <div class="sdot"></div>
                <span id="statusEl">Tap to talk</span>
            </div>

            <!-- Think dots -->
            <div class="think-wrap">
                <div class="tdot"></div>
                <div class="tdot"></div>
                <div class="tdot"></div>
            </div>

            <!-- Voice wave -->
            <div class="wave-wrap">
                <div class="wbar"></div>
                <div class="wbar"></div>
                <div class="wbar"></div>
                <div class="wbar"></div>
                <div class="wbar"></div>
            </div>
        </div>

    </div>

    <!-- Controls -->
    <div class="controls">
        <button class="btn btn-sm" id="muteBtn" onclick="toggleMute()" aria-label="Mute">🔊</button>
        <button class="btn btn-mic" id="mainBtn" onclick="handleTap()" aria-label="Speak">🎙️</button>
        <button class="btn btn-sm" onclick="clearSession()" aria-label="Reset" title="New conversation">↺</button>
    </div>

    <div class="hint">Space to speak &nbsp;·&nbsp; Tap the assistant to start</div>

    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <script>
        /* ── BUBBLE ── */
        const bubble = document.getElementById('bubble');
        let bTimer = null;
        function showBubble(txt, persist) {
            clearTimeout(bTimer);
            bubble.textContent = txt;
            bubble.classList.add('show');
            if (!persist) bTimer = setTimeout(() => bubble.classList.remove('show'), 5000);
        }
        function hideBubble() { bubble.classList.remove('show'); }

        /* ── STATE ── */
        const statusEl = document.getElementById('statusEl');
        const mainBtn = document.getElementById('mainBtn');
        const muteBtn = document.getElementById('muteBtn');
        const liveLabel = document.getElementById('liveLabel');
        const API_BASE = window.location.protocol === 'file:' ? 'http://127.0.0.1:5000' : '';
        let lkRoom = null, lkConnecting = false, lkReady = false;

        const LABELS = { idle: 'Tap to talk', listening: 'Listening…', thinking: 'Thinking…', speaking: 'Speaking…' };
        const ICONS = { idle: '🎙️', listening: '🎤', thinking: '💭', speaking: '🔊' };
        const LIVE = { listening: 'Listening', speaking: 'Speaking' };

        function setS(s) {
            window._state = s;
            document.body.className = 'state-' + s;
            statusEl.textContent = LABELS[s];
            mainBtn.textContent = ICONS[s];
            if (LIVE[s]) liveLabel.textContent = lkReady ? 'LiveKit ' + LIVE[s] : LIVE[s];
        }

        async function connectLiveKit() {
            if (lkReady || lkConnecting) return lkReady;
            if (!window.LivekitClient) {
                liveLabel.textContent = 'Voice SDK missing';
                return false;
            }
            lkConnecting = true;
            liveLabel.textContent = 'Connecting...';
            try {
                const identity = 'student-' + Math.random().toString(16).slice(2, 10);
                const res = await fetch(API_BASE + '/livekit/token?identity=' + encodeURIComponent(identity) + '&name=Student');
                const data = await res.json();
                if (!res.ok || !data.token) throw new Error(data.error || 'LiveKit token failed');
                lkRoom = new LivekitClient.Room({ adaptiveStream: true, dynacast: true });
                await lkRoom.connect(data.url, data.token);
                await lkRoom.localParticipant.setMicrophoneEnabled(true);
                lkReady = true;
                liveLabel.textContent = 'LiveKit Voice';
                return true;
            } catch (e) {
                console.warn('LiveKit error:', e);
                liveLabel.textContent = 'Browser Voice';
                showBubble('LiveKit could not connect. I will continue with browser voice.', false);
                return false;
            } finally {
                lkConnecting = false;
            }
        }

        /* ── SPEECH RECOGNITION ── */
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;
        let rec = null, muted = false, manStop = false;
        window._state = 'idle';

        if (SR) {
            rec = new SR();
            rec.lang = 'en-IN';
            rec.continuous = true;
            rec.interimResults = true;
            rec.onstart = () => { manStop = false; setS('listening'); };
            rec.onresult = (e) => {
                let f = '', i = '';
                for (let x = e.resultIndex; x < e.results.length; x++) {
                    const t = e.results[x][0].transcript;
                    e.results[x].isFinal ? (f += t) : (i += t);
                }
                if (f || i) showBubble('🎤 ' + (f || i), true);
                if (f.trim() && !manStop) { rec.stop(); fetchAnswer(f.trim()); }
            };
            rec.onend = () => { if (!manStop && window._state === 'listening') startL(); };
            rec.onerror = (e) => {
                if (e.error === 'not-allowed') {
                    showBubble('Please allow microphone access to talk with me 🎤', false);
                    manStop = true; setS('idle');
                }
            };
        }

        function handleTap() {
            if (window._state === 'idle') { manStop = false; connectLiveKit(); startL(); }
            else { manStop = true; stopAll(); }
        }
        function startL() { synth.cancel(); try { rec.start(); } catch (e) { } }
        function stopAll() {
            manStop = true;
            try { rec.abort(); } catch (e) { }
            synth.cancel(); setS('idle'); hideBubble();
        }
        function clearSession() { stopAll(); hideBubble(); }

        /* ── FETCH ── */
        const THINKING = [
            'Let me think about that…',
            'One moment…',
            'Hmm, give me a sec…',
            'Looking that up for you…',
        ];
        function fetchAnswer(q) {
            setS('thinking');
            showBubble(THINKING[Math.floor(Math.random() * THINKING.length)], true);
            fetch(API_BASE + '/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'msg=' + encodeURIComponent(q)
            })
                .then(r => r.json())
                .then(d => speakOut(d.response || "Sorry, I couldn't find an answer.", true))
                .catch(() => { showBubble("I can't reach the server right now 😔", false); setS('idle'); });
        }

        /* ── SPEAK ── */
        function speakOut(text, autoL) {
            if (muted) {
                setS('idle'); showBubble(text, false);
                if (autoL) setTimeout(() => { if (window._state === 'idle') startL(); }, 600);
                return;
            }
            playLiveKitTts(text, autoL);
        }

        function afterSpeaking(autoL) {
            if (!manStop) {
                setS('idle'); hideBubble();
                if (autoL) setTimeout(() => { if (!manStop && window._state === 'idle') startL(); }, 400);
            } else { setS('idle'); hideBubble(); }
        }

        function playLiveKitTts(text, autoL) {
            setS('speaking');
            liveLabel.textContent = 'Voice Online';
            showBubble(text, true);
            fetch(API_BASE + '/tts/livekit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
            })
                .then(r => {
                    if (!r.ok) throw new Error('LiveKit TTS failed');
                    return r.blob();
                })
                .then(blob => {
                    const audio = new Audio(URL.createObjectURL(blob));
                    audio.onended = () => afterSpeaking(autoL);
                    audio.onerror = () => speakBrowser(text, autoL);
                    audio.play().catch(() => speakBrowser(text, autoL));
                })
                .catch(() => speakBrowser(text, autoL));
        }

        function speakBrowser(text, autoL) {
            synth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-IN'; u.rate = 0.92; u.pitch = 1.05; u.volume = 1;
            const vs = synth.getVoices();
            const femaleHints = ['female', 'woman', 'zira', 'susan', 'samantha', 'victoria', 'karen', 'veena', 'google uk english female'];
            const v = vs.find(v => femaleHints.some(h => v.name.toLowerCase().includes(h)))
                || vs.find(v => v.lang === 'en-IN')
                || vs.find(v => v.lang.startsWith('en-GB'))
                || vs.find(v => v.lang.startsWith('en-US') && v.name.includes('Google'))
                || vs.find(v => v.lang.startsWith('en'));
            if (v) u.voice = v;
            u.onstart = () => { setS('speaking'); showBubble(text, true); };
            u.onend = () => afterSpeaking(autoL);
            u.onerror = () => { setS('idle'); hideBubble(); if (!manStop && autoL) setTimeout(() => startL(), 400); };
            setTimeout(() => synth.speak(u), 130);
        }

        /* ── WELCOME ── */
        const WELCOME = "Hi there! I am the Contai Polytechnic AI helpdesk assistant. Ask me about courses, departments, admissions, facilities, notices, or any study-related question.";

        function initVoices() {
            connectLiveKit();
            const v = synth.getVoices();
            if (v.length > 0) speakOut(WELCOME, true);
            else { synth.onvoiceschanged = () => { synth.onvoiceschanged = null; speakOut(WELCOME, true); }; }
        }
        window.addEventListener('load', () => setTimeout(initVoices, 800));

        /* ── MUTE ── */
        function toggleMute() {
            muted = !muted;
            muteBtn.textContent = muted ? '🔇' : '🔊';
            muteBtn.classList.toggle('on', muted);
            if (muted && window._state === 'speaking') {
                synth.cancel();
                if (!manStop) { setS('idle'); setTimeout(() => startL(), 400); }
                else setS('idle');
            }
        }

        /* ── KEYBOARD ── */
        document.addEventListener('keydown', e => {
            if (e.code === 'Space' && e.target === document.body) { e.preventDefault(); handleTap(); }
        });
    </script>
</body>

</html>
